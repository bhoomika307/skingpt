<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SkinGPT</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(135deg, #0f172a 0%, #1e293b 50%, #0f172a 100%);
            color: #e2e8f0;
        }
        .container {
            text-align: center;
            max-width: 520px;
            width: 90%;
        }
        .logo {
            font-size: 48px;
            font-weight: 700;
            margin-bottom: 8px;
            background: linear-gradient(135deg, #38bdf8, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .subtitle {
            color: #94a3b8;
            font-size: 16px;
            margin-bottom: 40px;
        }
        .upload-card {
            background: rgba(30, 41, 59, 0.8);
            border: 2px dashed #334155;
            border-radius: 16px;
            padding: 48px 32px;
            transition: all 0.3s ease;
            cursor: pointer;
            position: relative;
        }
        .upload-card:hover, .upload-card.dragover {
            border-color: #818cf8;
            background: rgba(30, 41, 59, 1);
            transform: translateY(-2px);
            box-shadow: 0 8px 30px rgba(129, 140, 248, 0.15);
        }
        .upload-icon {
            width: 64px;
            height: 64px;
            margin: 0 auto 16px;
            background: linear-gradient(135deg, #38bdf8, #818cf8);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .upload-icon svg { width: 32px; height: 32px; stroke: white; fill: none; }
        .upload-text { font-size: 18px; font-weight: 500; margin-bottom: 8px; }
        .upload-hint { color: #64748b; font-size: 14px; }
        #imageUpload { display: none; }
        .preview-container {
            display: none;
            margin-top: 24px;
        }
        .preview-container.active { display: block; }
        .preview-img {
            max-width: 100%;
            max-height: 240px;
            border-radius: 12px;
            border: 2px solid #334155;
            margin-bottom: 16px;
        }
        .file-name {
            color: #94a3b8;
            font-size: 14px;
            margin-bottom: 16px;
        }
        .analyze-btn {
            background: linear-gradient(135deg, #818cf8, #6366f1);
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 16px;
            font-weight: 600;
            border-radius: 12px;
            cursor: pointer;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }
        .analyze-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(99, 102, 241, 0.4);
        }
        .analyze-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
            margin-right: 8px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">SkinGPT</div>
        <p class="subtitle">AI-powered skin condition analysis</p>

        <form id="upload-form" action="/upload" method="post" enctype="multipart/form-data">
            <div class="upload-card" id="drop-zone">
                <div class="upload-icon">
                    <svg viewBox="0 0 24 24" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                </div>
                <p class="upload-text">Drop your skin image here</p>
                <p class="upload-hint">or click to browse (JPG, PNG)</p>
                <input type="file" name="image" id="imageUpload" accept="image/*" required>
            </div>

            <div class="preview-container" id="preview-container">
                <img id="preview-img" class="preview-img" alt="Preview">
                <p class="file-name" id="file-name"></p>
                <button type="submit" class="analyze-btn" id="analyze-btn">Analyze Image</button>
            </div>
        </form>
    </div>

    <script>
        const dropZone = document.getElementById('drop-zone');
        const fileInput = document.getElementById('imageUpload');
        const previewContainer = document.getElementById('preview-container');
        const previewImg = document.getElementById('preview-img');
        const fileName = document.getElementById('file-name');
        const form = document.getElementById('upload-form');
        const analyzeBtn = document.getElementById('analyze-btn');

        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            if (e.dataTransfer.files.length) {
                fileInput.files = e.dataTransfer.files;
                showPreview(e.dataTransfer.files[0]);
            }
        });

        fileInput.addEventListener('change', () => {
            if (fileInput.files.length) showPreview(fileInput.files[0]);
        });

        function showPreview(file) {
            const reader = new FileReader();
            reader.onload = (e) => {
                previewImg.src = e.target.result;
                fileName.textContent = file.name;
                previewContainer.classList.add('active');
            };
            reader.readAsDataURL(file);
        }

        form.addEventListener('submit', () => {
            analyzeBtn.disabled = true;
            analyzeBtn.innerHTML = '<span class="spinner"></span>Analyzing...';
        });
    </script>
</body>
</html>
